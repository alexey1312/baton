name: Install Claude CLI
description: >-
  Install the headless `claude` CLI (@anthropic-ai/claude-code) on an ubuntu-latest
  runner (Node.js is preinstalled). Authentication is via ANTHROPIC_API_KEY or
  CLAUDE_CODE_OAUTH_TOKEN supplied by the calling job. Runs as the non-root `runner`
  user — claude refuses `--dangerously-skip-permissions` (which baton passes) under root.
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail
        sudo npm install -g @anthropic-ai/claude-code
        claude --version

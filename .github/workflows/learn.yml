name: Learn

# `baton learn` runs unattended on a schedule (and on demand). It reads 👍/👎 +
# thread-resolution signal from recently merged PRs and opens/updates a single
# rolling draft PR proposing edits to Baton's own review setup.
#
# Token caveat: opening/updating the PR needs a token with `pull-requests: write`
# AND `contents: write`. The Actions `GITHUB_TOKEN` (a GitHub App token) qualifies.
# A plain PAT without those scopes degrades the run to preview output plus a
# warning rather than failing — mirroring the Check Run caveat in `baton publish`.
#
# Runs on ubuntu-latest (not a container): baton invokes claude with
# `--dangerously-skip-permissions`, which claude refuses under root.

on:
  schedule:
    # Weekly, Mondays at 06:00 UTC.
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      apply:
        description: "Open/update the rolling draft PR (false = preview only)"
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: baton-learn
  cancel-in-progress: false

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  # Agent credentials (claude/haiku per baton.toml): either ANTHROPIC_API_KEY (Console,
  # usage-billed) or CLAUDE_CODE_OAUTH_TOKEN (Pro/Max subscription). Both absent → learn
  # still previews safely but cannot run the agent to deliver the rolling PR.
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

jobs:
  learn:
    name: Reflect on review signal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so the rolling `learn` branch can be force-updated.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install claude CLI
        uses: ./.github/actions/install-claude

      # Install the latest released baton via mise's github backend instead of
      # compiling (the static Linux asset runs as-is). install:false keeps mise from
      # pulling a toolchain; `mise use -g` installs only baton.
      - uses: jdx/mise-action@v4
        with:
          install: false
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install baton from the GitHub release
        run: |
          mise use --global "github:alexey1312/swift-baton@latest"
          baton --version

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # The configured agent CLI (claude/haiku) and its credentials must be present for
      # delivery; without them `learn` still previews safely.
      - name: Run baton learn
        env:
          # `schedule` events have no inputs, so default to apply; `workflow_dispatch`
          # honors the boolean input. Passed via env to avoid run-script injection.
          APPLY: ${{ github.event.inputs.apply || 'true' }}
        run: |
          if [ "$APPLY" = "false" ]; then
            baton learn
          else
            baton learn --apply
          fi

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check formatting (Swift + Markdown)
        run: mise run format-check

      - name: Lint (SwiftLint + actionlint)
        run: mise run lint

  build-macos:
    name: Build & Test (macOS)
    runs-on: macos-14
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Cache SPM dependencies
        uses: actions/cache@v5
        with:
          path: .build
          key: ${{ runner.os }}-swift-6.3-spm-v2-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-6.3-spm-v2-

      - uses: jdx/mise-action@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: mise run build

      - name: Test
        run: mise run test

  build-linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-latest
    needs: lint
    container:
      image: swift:6.3
    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y curl git

      - uses: actions/checkout@v6

      - name: Cache SPM dependencies
        uses: actions/cache@v5
        with:
          path: .build
          key: ${{ runner.os }}-swift-6.3-spm-v2-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-6.3-spm-v2-

      - uses: jdx/mise-action@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: mise run build

      - name: Test
        run: mise run test

# TODO(windows): Re-add the Windows build job once the package compiles on Windows.
# Blocked by stephencelis/SQLite.swift, a `BatonKit` dependency: it does `import
# SQLite3`, which resolves against a system `SQLite3` module present in the macOS and
# Linux Swift toolchains but NOT shipped with the Windows toolchain, so the build
# fails with `error: no such module 'SQLite3'`. SQLite.swift 0.16.0 fixed Linux
# compilation but did not add Windows support. The job was `continue-on-error: true`
# (best-effort) and had been red for this reason, adding noise without signal.
# Options to unblock: vendor a C SQLite as a C target (no feature loss), or gate the
# Database module behind `#if !os(Windows)` (drops stats/history/show + learn cache
# on Windows). Until then, Windows is unsupported in CI.

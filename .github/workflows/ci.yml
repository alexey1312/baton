name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check formatting (Swift + Markdown)
        run: mise run format-check

      - name: Lint (SwiftLint + actionlint)
        run: mise run lint

  build-macos:
    name: Build & Test (macOS)
    runs-on: macos-14
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Cache SPM dependencies
        uses: actions/cache@v5
        with:
          path: .build
          key: ${{ runner.os }}-swift-6.3-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-6.3-spm-

      - uses: jdx/mise-action@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: mise run build

      - name: Test
        run: mise run test

  build-linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-latest
    needs: lint
    container:
      image: swift:6.3
    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y curl git

      - uses: actions/checkout@v6

      - name: Cache SPM dependencies
        uses: actions/cache@v5
        with:
          path: .build
          key: ${{ runner.os }}-swift-6.3-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-6.3-spm-

      - uses: jdx/mise-action@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: mise run build

      - name: Test
        run: mise run test

  build-windows:
    name: Build (Windows, best-effort)
    runs-on: windows-latest
    needs: lint
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Install Swift
        uses: compnerd/gha-setup-swift@v0.4.0
        with:
          swift-version: swift-6.3-release
          swift-build: 6.3-RELEASE

      - name: Cache SPM dependencies
        uses: actions/cache@v5
        with:
          path: .build
          key: ${{ runner.os }}-swift-6.3-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-6.3-spm-

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

# =============================================================================
# mise configuration for Baton
# =============================================================================
# Pins the toolchain and defines the canonical project tasks. Build/test pipe
# through xcsift for token-efficient output.

[settings]
experimental = true
legacy_version_file = false

# Auto-configure git hooks on directory entry (hooks live in .githooks/).
[hooks]
enter = """
git config core.hooksPath .githooks 2>/dev/null || true
"""

# =============================================================================
# Tools
# =============================================================================

[tools]
swift = "6.3"          # Swift toolchain
swiftformat = "0.60.1" # Swift code formatting
swiftlint = "0.63.2"   # Swift linting
xcsift = "1.2.0"       # xcodebuild/SPM output filtering
dprint = "0.53.1"      # Markdown/JSON formatting
hk = "1.39.0"          # Git hooks manager
pkl = "0.31.1"         # Configuration language (for hk.pkl)
actionlint = "1.7.11"  # GitHub Actions linting
git-cliff = "2.12.0"   # Changelog generation

# =============================================================================
# Onboarding
# =============================================================================

# Idempotent project bootstrap. Mainly wires up git hooks for fresh clones —
# the `[hooks] enter` block above only fires when mise shell-activation is set up
# globally, so contributors who use `mise x` / `mise run` without `mise activate`
# need an explicit one-shot to install hooks. Safe to rerun.
[tasks.setup]
description = "One-time project setup (configures git hooks, etc.)"
run = """
#!/usr/bin/env bash
set -euo pipefail
git config core.hooksPath .githooks
echo "✓ git hooks installed (core.hooksPath = .githooks)"
"""

# =============================================================================
# Build & test
# =============================================================================

# Tasks that pipe through xcsift use an explicit bash shebang + pipefail so a
# failed swift/swiftlint command propagates (the Linux default `sh` is dash, which
# rejects `set -o pipefail`, and a bare pipe would return xcsift's exit code).
# xcsift is output-prettification only and has no Linux build, so these tasks fall
# back to plain swift when it is absent (CI correctness comes from swift's exit).

[tasks.build]
description = "Build the Swift package (debug)"
run = """
#!/usr/bin/env bash
set -euo pipefail
if command -v xcsift >/dev/null 2>&1; then
  swift build 2>&1 | xcsift -f toon
else
  swift build
fi
"""

[tasks."build:release"]
description = "Build the Swift package (release)"
run = """
#!/usr/bin/env bash
set -euo pipefail
if command -v xcsift >/dev/null 2>&1; then
  swift build --configuration release 2>&1 | xcsift -f toon
else
  swift build --configuration release
fi
"""

[tasks.test]
description = "Run all tests"
run = """
#!/usr/bin/env bash
set -euo pipefail
if command -v xcsift >/dev/null 2>&1; then
  swift test 2>&1 | xcsift -f toon
else
  swift test
fi
"""

[tasks."test:filter"]
description = "Run tests matching a filter (usage: mise run test:filter BatonKitTests)"
run = """
#!/usr/bin/env bash
set -euo pipefail
if command -v xcsift >/dev/null 2>&1; then
  swift test --filter {{arg(name='filter')}} 2>&1 | xcsift -f toon
else
  swift test --filter {{arg(name='filter')}}
fi
"""

# =============================================================================
# Lint & format
# =============================================================================

[tasks.lint]
description = "Run SwiftLint (strict) and actionlint"
run = """
#!/usr/bin/env bash
set -euo pipefail
swiftlint lint --strict Sources Tests
actionlint
"""

[tasks."format:swift"]
description = "Format Swift code"
run = "swiftformat Sources Tests"

[tasks."format-check:swift"]
description = "Check Swift formatting (CI)"
run = "swiftformat Sources Tests --lint"

[tasks."format:md"]
description = "Format markdown files"
run = "dprint fmt"

[tasks."format-check:md"]
description = "Check markdown formatting (CI)"
run = "dprint check"

[tasks.format]
description = "Format all files (Swift + Markdown)"
run = """
swiftformat Sources Tests
dprint fmt
"""

[tasks.format-check]
description = "Check all formatting (CI)"
run = """
#!/usr/bin/env bash
set -euo pipefail
swiftformat Sources Tests --lint
dprint check
"""

# =============================================================================
# Dogfooding (pre-push)
# =============================================================================

# Run baton's own review over the commits a `git push` is about to publish.
# Wired into the pre-push git hook (.githooks/pre-push). Blocking: a non-zero
# exit (findings >= fail_on, or a task failure) aborts the push.
#
# Graceful skips (exit 0, push proceeds) keep the hook from wedging pushes when
# review is impossible or pointless:
#   - BATON_PREPUSH=0 set                  (explicit opt-out)
#   - no upstream configured for the branch (nothing to diff against)
#   - HEAD already matches the upstream     (nothing being pushed)
# Bypass everything with `git push --no-verify`.
#
# It diffs against the upstream ref (not the working tree), so it reviews the
# pushed commits even though the tree is clean at push time.
#
# Binary resolution (no per-push `swift build`): BATON_BIN override > `baton` on
# PATH (e.g. a mise-installed shim) > an ephemeral mise install of the released
# binary. This mirrors CI's dogfooding (`github:alexey1312/baton`), so the gate
# runs stable released behavior, not an in-progress local build. To review with
# unreleased local changes, set BATON_BIN=.build/release/baton.
[tasks.prepush-review]
description = "Review the commits being pushed with baton (pre-push hook)"
run = """
#!/usr/bin/env bash
set -euo pipefail

if [ "${BATON_PREPUSH:-1}" = "0" ]; then
  echo "baton: pre-push review skipped (BATON_PREPUSH=0)"
  exit 0
fi

upstream="$(git rev-parse --abbrev-ref --symbolic-full-name '@{upstream}' 2>/dev/null || true)"
if [ -z "$upstream" ]; then
  echo "baton: no upstream for this branch; skipping pre-push review"
  exit 0
fi
if git diff --quiet "$upstream" HEAD; then
  echo "baton: no changes vs $upstream; skipping pre-push review"
  exit 0
fi

echo "baton: reviewing changes vs $upstream (bypass: BATON_PREPUSH=0 or git push --no-verify)"
if [ -n "${BATON_BIN:-}" ]; then
  exec "$BATON_BIN" review --base "$upstream"
elif command -v baton >/dev/null 2>&1; then
  exec baton review --base "$upstream"
else
  exec mise x "github:alexey1312/baton@latest" -- baton review --base "$upstream"
fi
"""

# =============================================================================
# Docs, changelog, clean
# =============================================================================

[tasks.docs]
description = "Generate DocC documentation"
run = """
swift package --allow-writing-to-directory docs \
    generate-documentation --target BatonCLI \
    --disable-indexing \
    --transform-for-static-hosting \
    --hosting-base-path baton \
    --output-path docs
echo '<script>window.location.href += "/documentation/batoncli"</script>' > docs/index.html
"""

[tasks.changelog]
description = "Generate CHANGELOG.md from git history"
run = "git-cliff -o CHANGELOG.md"

[tasks."changelog:unreleased"]
description = "Preview unreleased changes"
run = "git-cliff --unreleased"

[tasks.clean]
description = "Clean build artifacts"
run = "swift package clean && rm -rf .build"

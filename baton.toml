[agent]
kind = "claude"
model = "haiku"

[[skills]]
name = "swift-style"
source = "./.claude/skills/swift"

[[reviews]]
name = "swift-style"
skills = ["swift-style"]
glob = ["**/*.swift"]
prompt = """
Review the added (`+`) lines in the diff against the attached Swift style guide. Emit a finding for each rule the code violates, citing the rule. Return {"findings": []} if nothing violates.
"""
